[theme]
# Light theme matching the app_ui shell — light-grey page, white surfaces,
# NBA-blue accent, dark off-black text. Keeps native widgets (tables, metrics,
# dropdown menus) legible and consistent with the injected CSS.
base = "light"
primaryColor = "#17408B"
backgroundColor = "#F4F6F9"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1A1F2E"
font = "sans serif"

[client]
toolbarMode = "minimal"
